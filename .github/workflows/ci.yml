name: DevOps Event App CI

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'app/devops-app-eventos/app.js'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout de código
      uses: actions/checkout@v4

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Construir Imagen Docker
      run: |
        docker build -t app-eventos:${{ github.sha }} -f docker/Dockerfile .
